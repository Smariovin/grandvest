name: Dump Nodes SSH
on:
  workflow_dispatch:
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Dump nodes via n8n API
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/dump_nodes.sh root@85.239.61.157:/tmp/dump_nodes.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/dump_nodes.sh 2>&1"

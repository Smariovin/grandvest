name: SQLite Exec Check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Check via SQLite
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/sqlite_exec_check.sh root@85.239.61.157:/tmp/sqlite_exec_check.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/sqlite_exec_check.sh 2>&1"

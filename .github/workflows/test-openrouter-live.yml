name: Test OpenRouter Live
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Test OR from VPS
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/test_openrouter_live.sh root@85.239.61.157:/tmp/test_openrouter_live.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/test_openrouter_live.sh 2>&1"

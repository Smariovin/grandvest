name: Diag Generation
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Diag generation node
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/diag_generation.sh root@85.239.61.157:/tmp/diag_generation.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/diag_generation.sh 2>&1"

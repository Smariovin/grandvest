name: Grandvest AI Content Factory — Master Setup & Control

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим запуска'
        required: true
        default: 'healthcheck'
        type: choice
        options:
          - healthcheck
          - fix_workflows
          - test_publish

jobs:
  master-control:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts

      - name: Check and fix container
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 'bash -s' << 'SSHEOF'
          ENVS=$(docker inspect n8n 2>/dev/null | grep -A30 Env | head -30)
          RUNNING=$(docker inspect -f '{{.State.Running}}' n8n 2>/dev/null || echo false)
          NEED=false
          for V in "N8N_SECURE_COOKIE=false" "N8N_TIMEZONE=Europe/Moscow" "GENERIC_TIMEZONE=Europe/Moscow"; do
            echo "$ENVS" | grep -q "$V" || NEED=true
          done
          [ "$RUNNING" != "true" ] && NEED=true
          if [ "$NEED" = "true" ]; then
            docker stop n8n 2>/dev/null; docker rm n8n 2>/dev/null
            docker run -d --name n8n --restart unless-stopped -p 5678:5678 \
              -v /opt/n8n/n8n_data:/home/node/.n8n \
cd /workspaces/grandvest && mkdir -p .github/workflows && cat > .github/workflows/grandvest-master.yml << 'ENDOFFILE'

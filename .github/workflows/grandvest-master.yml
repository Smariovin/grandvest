name: Grandvest Master Agent

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим'
        required: true
        default: 'healthcheck'
        type: choice
        options:
          - healthcheck
          - fix_workflows
          - test_publish

jobs:
  master-control:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts

      - name: Fix container and workflows
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "bash /opt/grandvest-agent.sh"

      - name: Test publish
        if: ${{ github.event.inputs.mode == 'test_publish' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot8672691136:AAF4yJeigfcmn6eCCkKC8GdJvxDb0o9cNnDg/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"5340000158","text":"✅ Grandvest Agent test

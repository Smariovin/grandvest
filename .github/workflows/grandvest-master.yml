      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts

      - name: Check and fix container
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 'bash -s' << 'SSHEOF'
          ENVS=$(docker inspect n8n 2>/dev/null | grep -A30 Env | head -30)
          RUNNING=$(docker inspect -f '{{.State.Running}}' n8n 2>/dev/null || echo false)
          NEED=false
          for V in "N8N_SECURE_COOKIE=false" "N8N_TIMEZONE=Europe/Moscow" "GENERIC_TIMEZONE=Europe/Moscow"; do

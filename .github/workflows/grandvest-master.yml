      - name: Send report
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 'bash -s' << 'SSHEOF'
          python3 << 'PYEOF'
import sqlite3,json,urllib.request,urllib.parse,subprocess
from datetime import datetime
BOT="8672691136:AAF4yJeigfcmn6eCCkKC8GdJvxDb0o9cNnDg"
CID="5340000158"
DB="/opt/n8n/n8n_data/database.sqlite"
def tg(m):
    try:
        d=urllib.parse.urlencode({"chat_id":CID,"text":m,"parse_mode":"HTML"}).encode()
        urllib.request.urlopen(urllib.request.Request("https://api.telegram.org/bot"+BOT+"/sendMessage",d),timeout=10)
    except: pass
r=["🤖 <b>Grandvest — Отчёт агента</b>",""]
run=subprocess.run(["docker","inspect","-f","{{.State.Running}}","n8n"],capture_output=True,text=True).stdout.strip()
r.append("🐳 n8n: "+("✅ Работает" if run=="true" else "❌ Остановлен"))

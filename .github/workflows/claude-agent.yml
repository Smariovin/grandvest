name: Claude Auto-Fix Agent
on:
  schedule:
    - cron: '0 6,15 * * *'
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run Agent
        run: |
          pip install requests -q
          cat > /tmp/agent.py << 'PYEOF'
          # agent code will be copied here
          PYEOF
          python3 /tmp/agent.py

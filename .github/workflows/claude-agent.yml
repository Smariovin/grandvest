name: Claude Auto-Fix Agent
on:
  schedule:
    - cron: '0 6,15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts

      - name: Run Claude Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-5
          timeout_minutes: 30
          direct_prompt: |
            Ты агент обслуживания Grandvest. SSH ключ в ~/.ssh/id_rsa.
            
            Выполни по порядку используя Bash:
            
            1. ssh -o StrictHostKeyChecking=no root@85.239.61.157 "docker ps | grep n8n && curl -s -o /dev/null -w '%{http_code}' http://localhost:5678/healthz"
            
            2. ssh -o StrictHostKeyChecking=no root@85.239.61.157 "python3 /root/fix_grandvest_all.py"
            
            3. ssh -o StrictHostKeyChecking=no root@85.239.61.157 "echo '[]' > /data/published_titles.json && echo '[]' > /opt/n8n/n8n_data/published_titles.json"
            
            4. ssh -o StrictHostKeyChecking=no root@85.239.61.157 "curl -X POST http://localhost:5678/webhook/telegram-parser -H 'Content-Type: application/json' -d '{\"channel\":\"arendator_ru\",\"html\":\"<div class=\\\"tgme_widget_message_text\\\">Офисная недвижимость Москвы: тест агента</div>\"}'"
            
            5. curl -s -X POST "https://api.telegram.org/bot8672691136:AAHHXmzhwkWoI6mTzrz8L3_DuQfpq7kTTbw/sendMessage" -d "chat_id=5340000158&parse_mode=HTML&text=<b>Отчёт агента Grandvest</b>%0AПроверка завершена успешно"

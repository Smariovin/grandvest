name: Verify Fix
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Verify
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: "5340000158"
        run: |
          scp -o StrictHostKeyChecking=no scripts/verify_fix.py root@85.239.61.157:/root/verify_fix.py
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "TG_BOT=$TG_BOT TG_CHAT=$TG_CHAT python3 /root/verify_fix.py 2>&1"

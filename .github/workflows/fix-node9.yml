name: Fix Node 9
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run Fix
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          pip install requests -q
          python3 scripts/fix_node9.py

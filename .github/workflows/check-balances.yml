name: Check Balances
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Check all balances
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             scripts/check_balances.py root@85.239.61.157:/tmp/check_balances.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             root@85.239.61.157 "GH_TOKEN=$GH_TOKEN python3 /tmp/check_balances.py 2>&1"

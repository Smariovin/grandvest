name: Autonomous Agent
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"
jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run Autonomous Agent
        env:
          WORKING_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/autonomous_agent.py root@85.239.61.157:/tmp/autonomous_agent.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "WORKING_PAT=$WORKING_PAT python3 /tmp/autonomous_agent.py 2>&1"

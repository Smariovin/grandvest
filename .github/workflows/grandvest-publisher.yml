name: Grandvest Publisher
on:
  workflow_dispatch:
    inputs:
      message:
        description: "Post text"
        required: true
      image_url:
        description: "Image URL"
        required: false
        default: ""
      source_url:
        description: "Source URL"
        required: false
        default: ""
      source_name:
        description: "Source name"
        required: false
        default: ""
      source_date:
        description: "Source date"
        required: false
        default: ""
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT: "5340000158"
          MSG: ${{ github.event.inputs.message }}
          IMG: ${{ github.event.inputs.image_url }}
          SOURCE_URL: ${{ github.event.inputs.source_url }}
          SOURCE_NAME: ${{ github.event.inputs.source_name }}
          SOURCE_DATE: ${{ github.event.inputs.source_date }}
        run: python3 scripts/tg_send.py

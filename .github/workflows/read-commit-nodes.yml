name: Read And Commit Nodes
on:
  workflow_dispatch:

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Read nodes and commit
        run: |
          mkdir -p debug
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/verify_state.py root@85.239.61.157:/tmp/verify_state.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "python3 /tmp/verify_state.py 2>&1" > debug/nodes_state.json
          echo "File size: $(wc -c < debug/nodes_state.json) bytes"
          cat debug/nodes_state.json | head -50
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add debug/nodes_state.json
          git diff --staged --quiet || git commit -m "debug: nodes state $(date '+%Y-%m-%d %H:%M')"
          git push

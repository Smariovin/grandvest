name: n8n Healthcheck & Auto-Fix

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts

      - name: Check and fix n8n
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 'bash -s' << 'SSHEOF'
          RUNNING=$(docker inspect -f "{{.State.Running}}" n8n 2>/dev/null || echo "false")
          ENVS=$(docker inspect n8n 2>/dev/null | grep -A20 Env | head -20)
          NEED_RECREATE=false
          for VAR in "N8N_SECURE_COOKIE=false" "N8N_TIMEZONE=Europe/Moscow" "GENERIC_TIMEZONE=Europe/Moscow"; do
            if ! echo "$ENVS" | grep -q "$VAR"; then
              NEED_RECREATE=true
            fi
          done
          if [ "$RUNNING" != "true" ] || [ "$NEED_RECREATE" = "true" ]; then
            docker stop n8n 2>/dev/null; docker rm n8n 2>/dev/null
            docker run -d --name n8n --restart unless-stopped -p 5678:5678 \
              -v /opt/n8n/n8n_data:/home/node/.n8n \
              -v /data:/data \
              -e N8N_TIMEZONE=Europe/Moscow \
              -e GENERIC_TIMEZONE=Europe/Moscow \
              -e N8N_SECURE_COOKIE=false \
              n8nio/n8n:latest
            sleep 15
            curl -s -X POST http://localhost:5678/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"emailOrLdapLoginId\":\"admin@grandvest.ru\",\"password\":\"Grandvest2026!\"}" > /dev/null
            echo "RECREATED"
          else
            echo "ALL OK"
          fi
          SSHEOF

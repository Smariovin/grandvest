name: Check RSS Schedule
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Check schedule
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/check_rss_schedule.sh root@85.239.61.157:/tmp/check_rss_schedule.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/check_rss_schedule.sh 2>&1"

name: Read Send Node9
on:
  workflow_dispatch:
jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Read node9 and test dispatch
        env:
          WORKING_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/read_and_send_node9.sh root@85.239.61.157:/tmp/read_and_send_node9.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "WORKING_PAT=$WORKING_PAT bash /tmp/read_and_send_node9.sh 2>&1"

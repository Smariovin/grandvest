name: Telegram Parser

on:
  schedule:
    - cron: '*/30 5-17 * * 1-5'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Telegram channels
        run: |
          for channel in CRERussia officenewsdaily nedvirf arendator_ru pravonadom1 rusipoteka ria_realty Commers_Estate; do
            echo "Parsing $channel..."
            curl -s "https://t.me/s/$channel" -H "User-Agent: Mozilla/5.0" --compressed > /tmp/tg.html
            python3 -c "import json; html=open('/tmp/tg.html').read(); open('/tmp/payload.json','w').write(json.dumps({'channel':'$channel','html':html}))"
            curl -s -X POST "http://85.239.61.157:5678/webhook/telegram-parser" -H "Content-Type: application/json" -d @/tmp/payload.json
            sleep 3
          done

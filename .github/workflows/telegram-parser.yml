name: Telegram Parser
on:
  schedule:
    - cron: "0 * * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:
jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run scheduler v3
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/scheduler.py root@85.239.61.157:/tmp/scheduler.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "python3 /tmp/scheduler.py 2>&1"

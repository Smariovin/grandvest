name: Telegram Parser

on:
  schedule:
    - cron: '*/30 5-17 * * 1-5'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Telegram channels
        run: |
          for channel in CRERussia officenewsdaily nedvirf arendator_ru; do
            echo "Parsing $channel..."
            response=$(curl -s "https://t.me/s/$channel" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: text/html,application/xhtml+xml" \
              -H "Accept-Language: ru-RU,ru;q=0.9" \
              --compressed)

            curl -s -X POST "http://85.239.61.157:5678/webhook/telegram-parser" \
              -H "Content-Type: application/json" \
              -d "{\"channel\": \"$channel\", \"html\": $(echo "$response" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"

            sleep 3
          done

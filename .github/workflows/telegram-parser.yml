name: Telegram Parser
on:
  schedule:
    - cron: "1 * * * *"
  workflow_dispatch:
jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Parse Telegram channels
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 scripts/parser_direct.py

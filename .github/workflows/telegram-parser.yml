name: Telegram Parser
on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Guardian check before parse
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          OR_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             scripts/grandvest_guardian.py root@85.239.61.157:/tmp/grandvest_guardian.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             root@85.239.61.157 "GH_PAT=$GH_PAT OR_KEY=$OR_KEY python3 /tmp/grandvest_guardian.py 2>&1" || true
      - name: Run smart scheduler
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             scripts/scheduler.py root@85.239.61.157:/tmp/scheduler.py
          ssh -i ~/.ssh/i_rsa -o StrictHostKeyChecking=no             root@85.239.61.157 "python3 /tmp/scheduler.py 2>&1"

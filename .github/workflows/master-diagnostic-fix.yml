name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Emergency restart n8n
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            echo "=== EMERGENCY RESTART ==="
            chown 1000:1000 /opt/n8n/n8n_data/database.sqlite 2>/dev/null || true
            chmod 644 /opt/n8n/n8n_data/database.sqlite 2>/dev/null || true
            docker start n8n 2>/dev/null || docker restart n8n 2>/dev/null || true
            sleep 20
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5678/healthz)
            echo "Health: $STATUS"
            docker ps | grep n8n
          ' || true
      - name: Verify and notify
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          sleep 10
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5678/healthz)
            BOT_TOKEN=$TG_BOT
            CHAT=5340000158
            if [ "$STATUS" = "200" ]; then
              MSG="n8n восстановлен! http://85.239.61.157:5678"
            else
              MSG="n8n всё ещё не отвечает. Статус: $STATUS. Пробуем ещё раз..."
              docker restart n8n
              sleep 30
              STATUS2=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5678/healthz)
              MSG="После второй попытки: $STATUS2"
            fi
            curl -s -X POST "https://api.telegram.org/bot$TG_BOT/sendMessage"               -d "chat_id=$CHAT"               -d "text=$MSG" || true
          ' || true

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Write token
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          TG_B64=$(echo -n "$TG_BOT" | base64)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "echo $TG_B64 | base64 -d > /tmp/.tb"
      - name: Trace
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 'printf '"'"'%s'"'"' '"'"''"'"' > /tmp/tr.b64
printf '"'"'%s'"'"' '"'"'ZWxzZTogbGluZXMuYXBwZW5kKCdTVFAgJytubls6MjVdKQp0b3BfZXJyPWV4LmdldCgnZGF0YScse30pLmdldCgncmVzdWx0RGF0YScse30pLmdldCgnZXJyb3InKQppZiB0b3BfZXJyOiBsaW5lcy5hcHBlbmQoJ1RPUEVSUjogJytzdHIodG9wX2VycilbOjgwXSkKdGcoJ1xuJy5qb2luKGxpbmVzKSkKcHJpbnQoJ0RPTkUnKQo='"'"' >> /tmp/tr.b64
python3 -c "import base64; open('"'"'/tmp/tr.py'"'"','"'"'wb'"'"').write(base64.b64decode(open('"'"'/tmp/tr.b64'"'"').read()))"
python3 /tmp/tr.py
'

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Test SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
          echo "SSH setup done"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@85.239.61.157 "echo CONNECTED && python3 --version && ls /root/ffr.py 2>/dev/null && echo FILE_EXISTS || echo FILE_MISSING"
      - name: Run fix if connected
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "TG_BOT=$TG_BOT python3 /root/ffr.py 2>&1" || echo "Script failed"

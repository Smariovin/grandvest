name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Send webhook + trace
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            printf '%s' '' > /tmp/tr.b64
            printf '%s' '' >> /tmp/tr.b64
            python3 -c "import base64; open('/tmp/tr.py','wb').write(base64.b64decode(open('/tmp/tr.b64').read()))"
            curl -s -X POST http://localhost:5678/webhook/telegram-parser \
              -H "Content-Type: application/json" \
              -d "{\"channel\": \"CRERussia\", \"html\": \"<div class=\\"tgme_widget_message_text js-message_text\\">\u041e\u0444\u0438\u0441\u043d\u044b\u0439 \u0440\u044b\u043d\u043e\u043a \u041c\u043e\u0441\u043a\u0432\u044b 2026: \u0432\u0430\u043a\u0430\u043d\u0442\u043d\u043e\u0441\u0442\u044c \u043a\u043b\u0430\u0441\u0441\u0430 \u0410 \u0441\u043d\u0438\u0437\u0438\u043b\u0430\u0441\u044c \u0434\u043e 7.8 \u043f\u0440\u043e\u0446\u0435\u043d\u0442\u0430. \u0421\u0442\u0430\u0432\u043a\u0438 \u0430\u0440\u0435\u043d\u0434\u044b \u0432 \u0426\u0410\u041e \u0434\u043e\u0441\u0442\u0438\u0433\u043b\u0438 48 000 \u0440\u0443\u0431\u043b\u0435\u0439 \u0437\u0430 \u043a\u0432.\u043c \u0432 \u0433\u043e\u0434 \u043f\u043e \u0434\u0430\u043d\u043d\u044b\u043c CBRE \u0437\u0430 \u0438\u044e\u043d\u044c 2026.</div><time datetime=\\"2026-06-29T09:58:00+00:00\\">09:58</time>\"}" && echo webhook_sent
            sleep 30
            TG_BOT=$TG_BOT python3 /tmp/tr.py 2>&1
          ' || true

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Root cause fix
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: "5340000158"
        run: |
          scp -o StrictHostKeyChecking=no scripts/root_cause_fix.py root@85.239.61.157:/root/root_cause_fix.py
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "GH_PAT=$GH_PAT TG_BOT=$TG_BOT TG_CHAT=$TG_CHAT python3 /root/root_cause_fix.py 2>&1"

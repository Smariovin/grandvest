name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: RSS Diagnostic
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: "5340000158"
          OR_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          scp -o StrictHostKeyChecking=no scripts/rss_diagnostic.py root@85.239.61.157:/root/rss_diag.py
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "TG_BOT=$TG_BOT TG_CHAT=$TG_CHAT OR_KEY=$OR_KEY python3 /root/rss_diag.py 2>&1"

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Upload script
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            printf '%s' '' > /tmp/fcp.b64
printf '%s' '' >> /tmp/fcp.b64
printf '%s' '' >> /tmp/fcp.b64
printf '%s' '' >> /tmp/fcp.b64
python3 -c "import base64; open('/tmp/fix_claude_prompt.py','wb').write(base64.b64decode(open('/tmp/fcp.b64').read()))"
          ' || true
      - name: Run fix
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          TG_BOT_B64=$(echo -n "$TG_BOT" | base64)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "
            echo $TG_BOT_B64 | base64 -d > /tmp/.tb
            export TG_BOT=\$(cat /tmp/.tb)
            python3 /tmp/fix_claude_prompt.py 2>&1
            rm -f /tmp/.tb
          "

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Fix RSS URLs and run
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/simple_url_fix.py root@85.239.61.157:/tmp/url_fix.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "TG_BOT=$TG_BOT python3 /tmp/url_fix.py 2>&1"

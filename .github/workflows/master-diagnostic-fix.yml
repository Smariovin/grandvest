name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Write and run restore
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            printf '%s' '' > /tmp/s.b64
          printf '%s' '' >> /tmp/s.b64
          printf '%s' '' >> /tmp/s.b64
          printf '%s' '' >> /tmp/s.b64
          printf '%s' '' >> /tmp/s.b64
          python3 -c "import base64; open('/root/ffr.py','wb').write(base64.b64decode(open('/tmp/s.b64').read()))"
          TG_BOT=$TG_BOT python3 /root/ffr.py 2>&1
          ' || true

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Emergency restart n8n
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          TG_B64=$(echo -n "$TG_BOT" | base64)
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "echo $TG_B64 | base64 -d > /tmp/.tb"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            echo "=== EMERGENCY RESTART ==="
            docker start n8n 2>/dev/null || docker restart n8n 2>/dev/null || true
            sleep 20
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5678/healthz)
            echo "Health: $STATUS"
            BOT=$(cat /tmp/.tb)
            curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage"               -d "chat_id=5340000158"               --data-urlencode "text=n8n восстановлен! Статус: $STATUS МСК 22:08"               -d "parse_mode=HTML" || true
          '

name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Trace via SSH with proper env
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "export TG_BOT=$TG_BOT && export GH_PAT=$GH_PAT && python3 /tmp/fc.py 2>&1"

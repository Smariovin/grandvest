name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Transfer script via SSH
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PART0: ''
          PART1: ''
          PART2: ''
          PART3: ''
          PART4: ''
          PART5: ''
          PART6: ''
          PART7: ''
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "
            rm -f /tmp/script.b64 /tmp/restore_rss.py
            printf '%s' "$PART0" >> /tmp/script.b64
          printf '%s' "$PART1" >> /tmp/script.b64
          printf '%s' "$PART2" >> /tmp/script.b64
          printf '%s' "$PART3" >> /tmp/script.b64
          printf '%s' "$PART4" >> /tmp/script.b64
          printf '%s' "$PART5" >> /tmp/script.b64
          printf '%s' "$PART6" >> /tmp/script.b64
          printf '%s' "$PART7" >> /tmp/script.b64
          
            base64 -d /tmp/script.b64 > /tmp/restore_rss.py
            echo Script size: \$(wc -c < /tmp/restore_rss.py)
            TG_BOT=$TG_BOT python3 /tmp/restore_rss.py 2>&1
          "

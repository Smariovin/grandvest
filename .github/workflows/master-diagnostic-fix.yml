name: Master Diagnostic Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run master fix via SSH
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          scp -o StrictHostKeyChecking=no scripts/master_fix_v2.py root@85.239.61.157:/root/master_fix_v2.py
          ssh -o StrictHostKeyChecking=no root@85.239.61.157 "GH_PAT=$GH_PAT python3 /root/master_fix_v2.py 2>&1"

name: N8N Workflow Backup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PUSH_TOKEN }}

      - name: Backup n8n workflows (read-only)
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          mkdir -p backups
          echo "=== CWD ===" > debug_output.log
          pwd >> debug_output.log
          echo "=== Running backup script ===" >> debug_output.log
          python3 scripts/backup_n8n.py >> debug_output.log 2>&1
          echo "=== Python exit code: $? ===" >> debug_output.log
          echo "=== ls backups/ ===" >> debug_output.log
          ls -la backups/ >> debug_output.log 2>&1

      - name: Always commit debug log
        if: always()
        run: |
          git config user.name "grandvest-backup-bot"
          git config user.email "backup@grandvest.local"
          git add -f debug_output.log
          git add -A backups/ 2>/dev/null || true
          git commit -m "debug: backup diagnostic log" || echo "nothing to commit"
          git push origin HEAD:main || echo "push failed"

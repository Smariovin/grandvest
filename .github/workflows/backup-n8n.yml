name: N8N Workflow Backup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Backup n8n workflows (read-only)
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          mkdir -p backups
          python3 scripts/backup_n8n.py

      - name: Commit and push backup
        env:
          PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          git config user.name "grandvest-backup-bot"
          git config user.email "backup@grandvest.local"
          git remote set-url origin https://x-access-token:${PUSH_TOKEN}@github.com/Smariovin/grandvest.git
          git add -A backups/ 2>/dev/null || true
          git status --porcelain -- backups/
          if [ -n "$(git status --porcelain -- backups/)" ]; then
            git commit -m "chore: daily n8n workflow backup $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
            echo "PUSHED"
          else
            echo "NOTHING_TO_COMMIT"
          fi

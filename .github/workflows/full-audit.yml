name: Full Audit
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run full audit
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             scripts/full_audit.sh root@85.239.61.157:/tmp/full_audit.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no             root@85.239.61.157 "GH_PAT=$GH_PAT bash /tmp/full_audit.sh 2>&1" | tee /tmp/audit_result.txt
          echo "=== AUDIT OUTPUT ==="
          cat /tmp/audit_result.txt

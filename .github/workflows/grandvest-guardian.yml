name: Grandvest Guardian
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run Guardian v4
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/grandvest_guardian.py

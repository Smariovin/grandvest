name: Grandvest Guardian
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run Guardian v3
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 '
            printf '%s' '' > /tmp/g.b64
            printf '%s' '' >> /tmp/g.b64
            python3 -c "import base64; open('/tmp/simple_guardian.py','wb').write(base64.b64decode(open('/tmp/g.b64').read()))"
            GH_PAT=$GH_PAT python3 /tmp/simple_guardian.py 2>&1
          ' || true

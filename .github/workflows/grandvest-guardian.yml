name: Grandvest Guardian
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Run Guardian
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          WORKING_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/grandvest_guardian.py root@85.239.61.157:/tmp/grandvest_guardian.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "GH_PAT=$GH_PAT python3 /tmp/grandvest_guardian.py 2>&1" || true

name: Send Nodes To TG
on:
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Send nodes to Telegram
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/send_nodes_to_tg.py root@85.239.61.157:/tmp/send_nodes_to_tg.py
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "python3 /tmp/send_nodes_to_tg.py 2>&1"

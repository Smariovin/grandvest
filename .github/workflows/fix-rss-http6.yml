name: Fix RSS HTTP6
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 85.239.61.157 >> ~/.ssh/known_hosts
      - name: Read RSS HTTP6 params
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/fix_rss_http6.sh root@85.239.61.157:/tmp/fix_rss_http6.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@85.239.61.157 "bash /tmp/fix_rss_http6.sh 2>&1"
